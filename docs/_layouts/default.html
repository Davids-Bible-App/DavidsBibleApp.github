<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ page.title }} | {{ site.title }}</title>

    <link rel="stylesheet" href="{{ '/assets/css/custom.css' | relative_url }}" />
  </head>

  <body>
    <header class="site-header">
      <div class="header-inner">
        <div class="site-title">
          <a href="{{ '/' | relative_url }}">DAVID'S BIBLE APP</a>
        </div>
        <nav class="top-nav">
          {% for item in site.nav %}
          <a href="{{ item.link | relative_url }}">{{ item.name }}</a>
          {% endfor %}
        </nav>
        <div class="header-icons">
          <a href="https://github.com/Davids-Bible-App" target="_blank">GitHub</a>
        </div>
      </div>
    </header>

    <div class="main-container">
      {% if page.sidebar != false %}
      <aside class="sidebar-container">
        <div class="sidebar-hero-card">
          <div class="sidebar-hero-logo">📖</div>
          <div class="sidebar-hero-text">David's Bible App</div>
          <div class="sidebar-hero-sub">Documentation</div>
        </div>

        <div class="sidebar-menu">
          <h3>On this site</h3>
          <ul>
            <li><a href="/help/">Overview</a></li>
            <li><a href="/help/navigation/">Navigation</a></li>
            <li><a href="/help/search/">Search</a></li>
            <li><a href="/help/translations/">Translations</a></li>
            <li><a href="/help/settings/">Settings</a></li>
            <li><a href="/help/troubleshooting/">Troubleshooting</a></li>
          </ul>
        </div>
      </aside>
      {% endif %}

      <main class="content-container">{{ content }}</main>
    </div>
  </body>
</html>
